<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0d10">
<title>Hors-ligne — Sport Salle</title>
<style>
  :root{--bg:#0c0d10;--surface:#14161c;--line:#23262f;--text:#f2f3f7;--muted:#8b8fa0;--accent:#e8a33d}
  @media (prefers-color-scheme: light){:root{--bg:#f2f0ea;--surface:#fff;--line:#e4e1d8;--text:#191b20;--muted:#6b7080}}
  *{box-sizing:border-box;margin:0}
  body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .box{max-width:340px}
  .logo{width:72px;height:72px;border-radius:22px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
    background:var(--surface);border:1px solid var(--line);color:var(--accent);box-shadow:0 8px 30px rgba(0,0,0,.18)}
  svg{width:36px;height:36px}
  h1{font-size:1.35rem;letter-spacing:-.02em;margin-bottom:8px}
  h1 span{color:var(--accent)}
  p{color:var(--muted);font-size:.95rem;line-height:1.5;margin-bottom:22px}
  button{border:none;border-radius:13px;padding:0 22px;height:50px;font-size:1rem;font-weight:700;
    background:var(--accent);color:#1c1503;cursor:pointer}
  button:active{transform:scale(.97)}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg></div>
    <h1>SPORT<span>SALLE</span> est hors-ligne</h1>
    <p>Impossible de joindre le réseau. Tes données restent en sécurité sur ce téléphone — réessaie dès que tu as du signal.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>

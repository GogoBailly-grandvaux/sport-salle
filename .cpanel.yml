---
# Déploiement automatique o2switch (cPanel → Git™ Version Control → Deploy).
# L'app est servie depuis le sous-domaine sportsalle.hbaillyg.fr.
# Pour changer d'emplacement, modifie DEPLOYPATH ci-dessous.
deployment:
  tasks:
    - export DEPLOYPATH=${HOME}/sportsalle.hbaillyg.fr
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/cp -R index.html 404.html offline.html legal.html app.webmanifest sw.js .htaccess css js data icons $DEPLOYPATH/
    - /bin/cp api/sync.php api/lib.php api/migrate.php api/auth.php api/social.php api/groups.php api/programs.php api/data.php api/config.sample.php api/schema.sql api/schema-v2.sql api/.htaccess $DEPLOYPATH/api/
    # config.php (secret) : jamais dans Git. On réutilise celui déjà rempli dans
    # public_html s'il existe, sinon on dépose le modèle à compléter une fois.
    - /bin/bash -c 'if [ ! -f "$DEPLOYPATH/api/config.php" ]; then if [ -f "$HOME/public_html/api/config.php" ]; then /bin/cp "$HOME/public_html/api/config.php" "$DEPLOYPATH/api/config.php"; else /bin/cp api/config.sample.php "$DEPLOYPATH/api/config.php"; fi; fi'

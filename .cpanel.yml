---
# Déploiement automatique o2switch (cPanel → Git™ Version Control → Deploy).
# Copie l'app dans public_html. Si ton site vit ailleurs (sous-domaine),
# change DEPLOYPATH ci-dessous.
deployment:
  tasks:
    - export DEPLOYPATH=${HOME}/public_html
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/cp -R index.html 404.html offline.html app.webmanifest sw.js css js data icons $DEPLOYPATH/
    - /bin/cp api/sync.php api/config.sample.php api/schema.sql api/.htaccess $DEPLOYPATH/api/
    - /bin/bash -c 'if [ ! -f "$DEPLOYPATH/api/config.php" ]; then /bin/cp api/config.sample.php "$DEPLOYPATH/api/config.php"; fi'
